<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roma Invicta TV</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Font Cinzel -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Cinzel', serif;
            position: relative;
            transition: background-image 0.5s ease;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Main container */
        #player-container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 25px;
            position: relative;
            z-index: 2;
            opacity: 1;
            transition: opacity 1s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #player-container.oculto {
            opacity: 0.15;
        }

        /* Title */
        #titulo {
            text-align: center;
            color: #f0e6d3;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(200, 0, 0, 0.3);
            padding-bottom: 10px;
            transition: all 0.5s ease;
        }

        #titulo span {
            color: #dc143c;
        }

        /* Player */
        #player {
            width: 620px;
            height: 330px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.15);
            display: block;
        }

        /* ===== NAVIGATION BUTTONS (BOTTOM) ===== */
        #nav-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 14px;
        }

        .nav-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(200, 0, 0, 0.4);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #f0e6d3;
            font-size: 1.5rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .nav-button:hover {
            background: rgba(200, 0, 0, 0.25);
            border-color: #dc143c;
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.2);
        }

        .nav-button:active {
            transform: scale(0.92);
        }

        .nav-button svg {
            width: 24px;
            height: 24px;
            fill: #f0e6d3;
            transition: fill 0.3s ease;
        }

        .nav-button:hover svg {
            fill: #dc143c;
        }

        /* Navigation counter */
        #nav-counter {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 400;
            min-width: 60px;
            text-align: center;
        }

        #nav-counter span {
            color: #dc143c;
            font-weight: 700;
        }

        /* Status indicator */
        #status {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
            transition: all 0.5s ease;
        }

        #status span {
            color: #dc143c;
            font-weight: 700;
        }

        /* Audio message - special style */
        #status.audio-message {
            color: #dc143c;
            font-size: 0.9rem;
            text-shadow: 0 0 20px rgba(200, 0, 0, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        #status.audio-message span {
            color: #ff6b6b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Title with audio message */
        #titulo.audio-message {
            color: #dc143c;
            text-shadow: 0 0 40px rgba(200, 0, 0, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }

        #titulo.audio-message span {
            color: #ff6b6b;
        }

        /* ===== MOBILE AUDIO BUTTON ===== */
        #audio-toggle {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 32px;
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #audio-toggle:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 0 60px rgba(200, 0, 0, 0.6);
        }

        #audio-toggle:active {
            transform: translateX(-50%) scale(0.95);
        }

        #audio-toggle.muted {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.4);
        }

        #audio-toggle.audio-activated {
            display: none !important;
        }

        /* ===== ABOUT BUTTON ===== */
        #about-button {
            display: block;
            margin: 20px auto 0;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid rgba(200, 0, 0, 0.3);
            border-radius: 50px;
            color: #f0e6d3;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            width: auto;
        }

        #about-button:hover {
            background: rgba(200, 0, 0, 0.15);
            border-color: #dc143c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.15);
            color: #dc143c;
        }

        #about-button:active {
            transform: scale(0.97);
        }

        .button-wrapper {
            text-align: center;
            margin-top: 5px;
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            #titulo {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            #player-container {
                padding: 12px;
                width: 95vw;
            }

            #player {
                width: 90vw;
                height: calc(90vw * 0.5625);
            }

            #status.audio-message {
                font-size: 0.7rem;
            }

            #audio-toggle {
                display: block;
                bottom: 70px;
                padding: 14px 24px;
                font-size: 1rem;
            }

            #about-button {
                padding: 10px 28px;
                font-size: 0.8rem;
            }

            .nav-button {
                width: 42px;
                height: 42px;
            }

            .nav-button svg {
                width: 20px;
                height: 20px;
            }

            #nav-bottom {
                gap: 14px;
            }

            #nav-counter {
                font-size: 0.6rem;
                min-width: 50px;
            }
        }

        @media (max-width: 480px) {
            #titulo {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            #status {
                font-size: 0.7rem;
            }

            #status.audio-message {
                font-size: 0.6rem;
            }

            #audio-toggle {
                bottom: 60px;
                padding: 12px 20px;
                font-size: 0.8rem;
            }

            #about-button {
                padding: 8px 20px;
                font-size: 0.7rem;
                letter-spacing: 1px;
            }

            .nav-button {
                width: 36px;
                height: 36px;
            }

            .nav-button svg {
                width: 16px;
                height: 16px;
            }

            #nav-bottom {
                gap: 10px;
            }

            #nav-counter {
                font-size: 0.5rem;
                min-width: 40px;
            }
        }

        @media (min-width: 769px) {
            #audio-toggle {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <div id="player-container">
        <!-- TITLE -->
        <div id="titulo"><span>Roma</span> Invicta TV</div>

        <!-- PLAYER -->
        <div id="player"></div>

        <!-- NAVIGATION BOTTOM -->
        <div id="nav-bottom">
            <button id="prev-button" class="nav-button" aria-label="Previous video">
                <svg viewBox="0 0 24 24">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </button>

            <span id="nav-counter"><span id="video-counter">1</span> / <span id="total-counter">0</span></span>

            <button id="next-button" class="nav-button" aria-label="Next video">
                <svg viewBox="0 0 24 24">
                    <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/>
                </svg>
            </button>
        </div>

        <!-- STATUS -->
        <div id="status">▶ <span>●</span> LIVE</div>

        <!-- ABOUT BUTTON -->
        <div class="button-wrapper">
            <a href="about.html" id="about-button">About & Credits</a>
        </div>

        <!-- MOBILE AUDIO BUTTON -->
        <button id="audio-toggle" class="muted">
            🔊 CLICK HERE TO TURN ON SOUND
        </button>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ====== RANDOM BACKGROUND ======
        (function() {
            const backgrounds = [
                "background1.jpg",
                "background2.jpg",
                "background3.jpg",
                "background4.jpg",
                "background5.jpg",
                "background6.jpg"
            ];

            const randomIndex = Math.floor(Math.random() * backgrounds.length);
            const chosenImage = backgrounds[randomIndex];

            document.body.style.backgroundImage = `url("${chosenImage}")`;

            console.log(`🎨 Background selected: ${chosenImage} (${randomIndex + 1}/6)`);
        })();

        // ====== DAY SCHEDULE ======
        // Each day has 6 slots. Each slot can have multiple video IDs separated by "/"
        // Format: "VIDEO_ID+START_TIME" to start at a specific second
        // Example: "1FzdlwOWoJc+16" starts at 16 seconds
        // Example: "ODxpHPiF2IU" starts at 0 seconds (default)

        const schedule = {
            // Sunday
            0: ["", "", "", "", "", ""],
            // Monday
            1: ["", "", "", "", "", ""],
            // Tuesday
            2: ["", "", "", "", "", ""],
            // Wednesday
            3: ["", "", "", "", "", ""],
            // Thursday
            4: [
                "ODxpHPiF2IU/1kfxiX5aIZc/GYGXYYOp4as/Wx3c4AjAO58",
                "",
                "",
                "",
                "",
                ""
            ],
            // Friday
            5: ["w1K0xqxl7Bo/3z_QAPB3XeA/1FzdlwOWoJc+16/1FzdlwOWoJc", "", "", "", "", ""],
            // Saturday
            6: ["", "", "", "", "", ""]
        };

        // ====== FUNCTION TO FILTER EMPTY SLOTS ======
        function getValidSlots(day) {
            const allSlots = schedule[day] || [];
            return allSlots.filter(slot => slot && slot.trim() !== "");
        }

        // ====== FUNCTION TO PARSE VIDEO SLOT ======
        function parseVideoSlot(slot) {
            return slot.split('/').filter(id => id.trim() !== "");
        }

        // ====== FUNCTION TO EXTRACT VIDEO ID AND START TIME ======
        function parseVideoEntry(entry) {
            const parts = entry.split('+');
            const videoId = parts[0];
            const startTime = parts[1] ? parseInt(parts[1], 10) : 0;
            return { videoId, startTime };
        }

        // ====== GET TODAY'S SCHEDULE ======
        const today = new Date().getDay();
        const todayDate = new Date().toDateString(); // "Thu Jun 18 2026"
        const validSlots = getValidSlots(today);

        console.log(`📋 Valid slots for today: ${validSlots.length}`);

        // Flatten all videos from all slots into a single array with start times
        let allVideos = [];
        let allStartTimes = [];

        validSlots.forEach(slot => {
            const entries = parseVideoSlot(slot);
            entries.forEach(entry => {
                const { videoId, startTime } = parseVideoEntry(entry);
                allVideos.push(videoId);
                allStartTimes.push(startTime);
            });
        });

        console.log(`🎬 Total videos for today: ${allVideos.length}`);

        // Update total counter
        document.getElementById('total-counter').textContent = allVideos.length;

        // ====== SAVE / LOAD RESUME STATE ======
        const STORAGE_KEY = 'roma_tv_resume';

        function saveProgress(videoIndex, currentTime) {
            try {
                const data = {
                    index: videoIndex,
                    time: Math.floor(currentTime || 0),
                    date: todayDate
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                console.log(`💾 Progress saved: video ${videoIndex + 1}, time ${data.time}s, date ${data.date}`);
            } catch (e) {
                console.warn('Could not save progress:', e);
            }
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                return data;
            } catch (e) {
                console.warn('Could not load progress:', e);
                return null;
            }
        }

        // ====== PLAYER VARIABLES ======
        let currentVideoIndex = 0;
        let player;
        let messageActive = false;
        let statusOriginal = '';
        let soundActivated = false;
        let isTransitioning = false;
        let hasSeeked = false;
        let resumeTime = 0;

        // ====== UPDATE VIDEO COUNTER ======
        function updateCounter() {
            document.getElementById('video-counter').textContent = currentVideoIndex + 1;
        }

        // ====== SAVE PROGRESS ON STATE CHANGE ======
        function saveCurrentProgress() {
            if (player && player.getCurrentTime) {
                const currentTime = player.getCurrentTime();
                saveProgress(currentVideoIndex, currentTime);
            } else {
                saveProgress(currentVideoIndex, 0);
            }
        }

        // ====== FUNCTION TO LOAD SPECIFIC VIDEO ======
        function loadVideo(index, seekTime) {
            if (allVideos.length === 0) {
                console.warn('⚠️ No videos scheduled for today.');
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO CONTENT TODAY';
                return;
            }

            // Ensure index is within bounds
            if (index < 0) {
                index = allVideos.length - 1;
            } else if (index >= allVideos.length) {
                index = 0;
            }

            currentVideoIndex = index;
            updateCounter();

            const videoId = allVideos[currentVideoIndex];
            const startTime = seekTime !== undefined ? seekTime : (allStartTimes[currentVideoIndex] || 0);

            console.log(`🎬 Loading video ${currentVideoIndex + 1}/${allVideos.length}: ${videoId} (start: ${startTime}s)`);

            if (player) {
                isTransitioning = true;
                hasSeeked = false;
                player.loadVideoById(videoId);
                player.playVideo();

                // If we have a seek time, use it after video loads
                if (startTime > 0) {
                    // Will be handled in onPlayerStateChange
                    resumeTime = startTime;
                } else {
                    resumeTime = 0;
                }

                setTimeout(() => {
                    isTransitioning = false;
                }, 1000);
            }

            const statusElement = document.getElementById('status');
            if (!messageActive) {
                statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                statusElement.className = '';
                statusOriginal = statusElement.innerHTML;
            }
        }

        // ====== FUNCTION TO LOAD NEXT VIDEO ======
        function loadNextVideo() {
            saveCurrentProgress();
            loadVideo(currentVideoIndex + 1);
        }

        // ====== FUNCTION TO LOAD PREVIOUS VIDEO ======
        function loadPreviousVideo() {
            saveCurrentProgress();
            loadVideo(currentVideoIndex - 1);
        }

        // ====== YOUTUBE IFrame API ======
        function onYouTubeIframeAPIReady() {
            if (allVideos.length === 0) {
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO CONTENT TODAY';
                return;
            }

            // Check for saved progress
            const saved = loadProgress();
            let startIndex = 0;
            let startTime = 0;

            if (saved && saved.date === todayDate) {
                // Same day - restore progress
                startIndex = Math.min(saved.index, allVideos.length - 1);
                startTime = saved.time || 0;
                console.log(`🔄 Restoring progress: video ${startIndex + 1}/${allVideos.length}, time ${startTime}s`);
            } else if (saved && saved.date !== todayDate) {
                console.log(`📅 Different day (${saved.date} vs ${todayDate}). Starting from beginning.`);
                // Different day - start from beginning
                startIndex = 0;
                startTime = allStartTimes[0] || 0;
                // Clear old progress
                localStorage.removeItem(STORAGE_KEY);
            } else {
                // No saved progress
                startIndex = 0;
                startTime = allStartTimes[0] || 0;
            }

            currentVideoIndex = startIndex;
            updateCounter();

            const videoId = allVideos[startIndex];
            const finalStartTime = startTime > 0 ? startTime : (allStartTimes[startIndex] || 0);

            console.log(`🎬 Starting with video ${startIndex + 1}/${allVideos.length}: ${videoId} (start: ${finalStartTime}s)`);

            player = new YT.Player('player', {
                width: '560',
                height: '315',
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    controls: 1,
                    rel: 0,
                    mute: 1,
                    modestbranding: 1,
                    iv_load_policy: 3,
                    cc_load_policy: 0,
                    fs: 1,
                    playsinline: 1,
                    start: finalStartTime
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });

            const statusElement = document.getElementById('status');
            if (!messageActive) {
                statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                statusElement.className = '';
                statusOriginal = statusElement.innerHTML;
            }

            // Save progress after video starts
            setTimeout(() => {
                saveCurrentProgress();
            }, 3000);

            console.log(`✅ Player initialized with video ${startIndex + 1}/${allVideos.length} (start: ${finalStartTime}s)`);
        }

        // ====== PLAYER STATE CHANGE ======
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                // Handle resume time for manual seeks
                if (resumeTime > 0 && !hasSeeked) {
                    hasSeeked = true;
                    player.seekTo(resumeTime, true);
                    console.log(`⏩ Seeking to ${resumeTime}s`);
                    resumeTime = 0;
                }

                // If it's the first play, restore saved time
                if (!hasSeeked && currentVideoIndex === 0) {
                    const saved = loadProgress();
                    if (saved && saved.date === todayDate && saved.time > 0) {
                        hasSeeked = true;
                        player.seekTo(saved.time, true);
                        console.log(`⏩ Restoring to saved time: ${saved.time}s`);
                    }
                }

                if (!messageActive) {
                    const statusElement = document.getElementById('status');
                    statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                    statusElement.className = '';
                    statusOriginal = statusElement.innerHTML;
                }
            }

            if (event.data === YT.PlayerState.ENDED) {
                console.log('📯 Video ended. Advancing to next...');
                saveCurrentProgress();
                loadNextVideo();
            }

            if (event.data === YT.PlayerState.PAUSED) {
                if (!messageActive) {
                    document.getElementById('status').innerHTML = '⏸ <span>●</span> PAUSED';
                    document.getElementById('status').className = '';
                    statusOriginal = '⏸ <span>●</span> PAUSED';
                }
            }
        }

        // ====== PLAYER ERROR HANDLER ======
        function onPlayerError(event) {
            console.log('⚠️ Player error:', event.data);

            if (!messageActive) {
                document.getElementById('status').innerHTML = '⚠️ <span>●</span> ERROR - Next video...';
                document.getElementById('status').className = '';
            }

            setTimeout(() => {
                saveCurrentProgress();
                loadNextVideo();
            }, 3000);
        }

        // ====== FUNCTION TO ACTIVATE AUDIO (MOBILE) ======
        function activateAudio() {
            if (player && !soundActivated) {
                player.unMute();
                soundActivated = true;

                const button = document.getElementById('audio-toggle');
                button.classList.add('audio-activated');
                button.style.display = 'none';

                const statusElement = document.getElementById('status');
                statusElement.innerHTML = '🔊 <span>●</span> AUDIO ENABLED';
                statusElement.className = 'audio-message';

                setTimeout(() => {
                    if (!messageActive) {
                        statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                        statusElement.className = '';
                    }
                }, 2000);

                console.log('✅ Audio activated on mobile!');
            }
        }

        // ====== FUNCTION TO SHOW AUDIO MESSAGE ======
        function showAudioMessage() {
            messageActive = true;

            const statusElement = document.getElementById('status');
            statusOriginal = statusElement.innerHTML;

            statusElement.innerHTML = '🔊 <span>●</span> ENABLE AUDIO ON PLAYER';
            statusElement.className = 'audio-message';

            document.title = '🔊 ENABLE AUDIO ON PLAYER';

            const titleElement = document.getElementById('titulo');
            titleElement.innerHTML = '🔊 <span>ENABLE</span> AUDIO';
            titleElement.className = 'audio-message';

            const button = document.getElementById('audio-toggle');
            if (window.innerWidth <= 768) {
                button.style.display = 'block';
                button.classList.add('muted');
            }

            setTimeout(() => {
                returnToNormal();
            }, 15000);
        }

        // ====== FUNCTION TO RETURN TO NORMAL ======
        function returnToNormal() {
            messageActive = false;

            const statusElement = document.getElementById('status');
            statusElement.innerHTML = '▶ <span>●</span> PLAYING';
            statusElement.className = '';

            document.title = 'Roma Invicta TV';

            const titleElement = document.getElementById('titulo');
            titleElement.innerHTML = '<span>Roma</span> Invicta TV';
            titleElement.className = '';

            if (soundActivated) {
                const button = document.getElementById('audio-toggle');
                button.style.display = 'none';
            }

            if (player && player.getPlayerState) {
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                } else if (state === YT.PlayerState.PAUSED) {
                    statusElement.innerHTML = '⏸ <span>●</span> PAUSED';
                }
            }
        }

        // ====== HIDE ON MOUSE LEAVE ======
        let mouseTimer;
        const container = document.getElementById("player-container");

        container.addEventListener("mouseenter", () => {
            container.classList.remove("oculto");
            clearTimeout(mouseTimer);
        });

        container.addEventListener("mouseleave", () => {
            clearTimeout(mouseTimer);
            mouseTimer = setTimeout(() => {
                container.classList.add("oculto");
            }, 2000);
        });

        // ====== AUTOPLAY FALLBACK ======
        setTimeout(() => {
            if (player && player.getPlayerState && player.getPlayerState() === -1) {
                player.playVideo();
            }
        }, 3000);

        // ====== INITIALIZE AUDIO MESSAGE ======
        window.addEventListener('load', function() {
            setTimeout(() => {
                showAudioMessage();
            }, 1000);
        });

        // ====== SAVE PROGRESS REGULARLY ======
        setInterval(() => {
            if (player && player.getCurrentTime) {
                saveCurrentProgress();
            }
        }, 5000); // Save every 5 seconds

        // ====== SAVE PROGRESS BEFORE PAGE UNLOADS ======
        window.addEventListener('beforeunload', function() {
            saveCurrentProgress();
        });

        // ====== NAVIGATION BUTTONS ======
        document.getElementById('next-button').addEventListener('click', loadNextVideo);
        document.getElementById('prev-button').addEventListener('click', loadPreviousVideo);

        // ====== MOBILE BUTTON EVENT ======
        document.getElementById('audio-toggle').addEventListener('click', activateAudio);

        // ====== DETECT WINDOW RESIZE ======
        window.addEventListener('resize', function() {
            const button = document.getElementById('audio-toggle');
            if (window.innerWidth <= 768 && !soundActivated && messageActive) {
                button.style.display = 'block';
            } else if (window.innerWidth > 768 || soundActivated) {
                button.style.display = 'none';
            }
        });

        // ====== KEYBOARD SHORTCUTS ======
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                loadNextVideo();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                loadPreviousVideo();
            }
        });
    </script>

</body>

</html>
