<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roma Invicta TV</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Font Cinzel -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Cinzel', serif;
            position: relative;
            transition: background-image 0.5s ease;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Main container */
        #player-container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 25px;
            position: relative;
            z-index: 2;
            opacity: 1;
            transition: opacity 1s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #player-container.oculto {
            opacity: 0.15;
        }

        /* Title */
        #titulo {
            text-align: center;
            color: #f0e6d3;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(200, 0, 0, 0.3);
            padding-bottom: 10px;
            transition: all 0.5s ease;
        }

        #titulo span {
            color: #dc143c;
        }

        /* Player */
        #player {
            width: 700px;
            height: 394px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.15);
        }

        /* Status indicator */
        #status {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
            transition: all 0.5s ease;
        }

        #status span {
            color: #dc143c;
            font-weight: 700;
        }

        /* Audio message - special style */
        #status.audio-message {
            color: #dc143c;
            font-size: 0.9rem;
            text-shadow: 0 0 20px rgba(200, 0, 0, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        #status.audio-message span {
            color: #ff6b6b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Title with audio message */
        #titulo.audio-message {
            color: #dc143c;
            text-shadow: 0 0 40px rgba(200, 0, 0, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }

        #titulo.audio-message span {
            color: #ff6b6b;
        }

        /* ===== MOBILE AUDIO BUTTON ===== */
        #audio-toggle {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 32px;
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #audio-toggle:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 0 60px rgba(200, 0, 0, 0.6);
        }

        #audio-toggle:active {
            transform: translateX(-50%) scale(0.95);
        }

        #audio-toggle.muted {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.4);
        }

        #audio-toggle.audio-activated {
            display: none !important;
        }

        /* ===== ABOUT BUTTON ===== */
        #about-button {
            display: block;
            margin: 20px auto 0;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid rgba(200, 0, 0, 0.3);
            border-radius: 50px;
            color: #f0e6d3;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            width: auto;
        }

        #about-button:hover {
            background: rgba(200, 0, 0, 0.15);
            border-color: #dc143c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.15);
            color: #dc143c;
        }

        #about-button:active {
            transform: scale(0.97);
        }

        .button-wrapper {
            text-align: center;
            margin-top: 5px;
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            #player {
                width: 90vw;
                height: calc(90vw * 0.5625);
            }

            #titulo {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            #player-container {
                padding: 12px;
                width: 95vw;
            }

            #status.audio-message {
                font-size: 0.7rem;
            }

            #audio-toggle {
                display: block;
                bottom: 70px;
                padding: 14px 24px;
                font-size: 1rem;
            }

            #about-button {
                padding: 10px 28px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            #titulo {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            #status {
                font-size: 0.7rem;
            }

            #status.audio-message {
                font-size: 0.6rem;
            }

            #audio-toggle {
                bottom: 60px;
                padding: 12px 20px;
                font-size: 0.8rem;
            }

            #about-button {
                padding: 8px 20px;
                font-size: 0.7rem;
                letter-spacing: 1px;
            }
        }

        @media (min-width: 769px) {
            #audio-toggle {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <div id="player-container">
        <!-- TITLE -->
        <div id="titulo">Roma <span>Invicta</span> TV</div>

        <div id="player"></div>

        <!-- STATUS -->
        <div id="status">▶ <span>●</span> LIVE</div>

        <!-- ABOUT BUTTON -->
        <div class="button-wrapper">
            <a href="about.html" id="about-button">🏛️ About & Credits</a>
        </div>

        <!-- MOBILE AUDIO BUTTON -->
        <button id="audio-toggle" class="muted">
            🔊 CLICK HERE TO TURN ON SOUND
        </button>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ====== RANDOM BACKGROUND ======
        (function() {
            const backgrounds = [
                "background1.jpg",
                "background2.jpg",
                "background3.jpg",
                "background4.jpg",
                "background5.jpg",
                "background6.jpg"
            ];

            const randomIndex = Math.floor(Math.random() * backgrounds.length);
            const chosenImage = backgrounds[randomIndex];

            document.body.style.backgroundImage = `url("${chosenImage}")`;

            console.log(`🎨 Background selected: ${chosenImage} (${randomIndex + 1}/6)`);
        })();

        // ====== DAY SCHEDULE ======
        // 6 playlist slots for each day of the week
        // Leave empty string "" for unused slots
        // Only the playlist ID is needed (not the full URL)

        const schedule = {
            // Sunday
            0: ["", "", "", "", "", ""],
            // Monday
            1: ["", "", "", "", "", ""],
            // Tuesday
            2: ["", "", "", "", "", ""],
            // Wednesday
            3: ["", "", "", "", "", ""],
            // Thursday
            4: [
                "PLGr-y_RTcNnv14zEh_rYVBrQLYL0SyZho",
                "PLGr-y_RTcNnsmduQh9L60psB1k2XTXUdA",
                "",
                "",
                "",
                ""
            ],
            // Friday
            5: ["", "", "", "", "", ""],
            // Saturday
            6: ["", "", "", "", "", ""]
        };

        // ====== FUNCTION TO FILTER EMPTY PLAYLISTS ======
        function getValidPlaylists(day) {
            const allPlaylists = schedule[day] || [];
            return allPlaylists.filter(id => id && id.trim() !== "");
        }

        // ====== GET TODAY'S PLAYLISTS ======
        const today = new Date().getDay();
        const playlistsForToday = getValidPlaylists(today);

        console.log(`📋 Valid playlists for today: ${playlistsForToday.length}`);

        // ====== PLAYER VARIABLES ======
        let currentPlaylistIndex = 0;
        let player;
        let messageActive = false;
        let statusOriginal = '';
        let soundActivated = false;
        let isTransitioning = false; // Prevent multiple transitions

        // ====== FUNCTION TO LOAD NEXT PLAYLIST ======
        function loadNextPlaylist() {
            if (playlistsForToday.length === 0) {
                console.warn('⚠️ No playlists scheduled for today.');
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO CONTENT TODAY';
                return;
            }

            // Get current playlist ID
            const playlistId = playlistsForToday[currentPlaylistIndex];

            console.log(`🎬 Loading playlist ${currentPlaylistIndex + 1}/${playlistsForToday.length}: ${playlistId}`);

            // Load playlist in player
            if (player) {
                isTransitioning = true;
                player.loadPlaylist({
                    list: playlistId,
                    listType: 'playlist'
                });
                player.playVideo();
                
                // Reset transitioning flag after a short delay
                setTimeout(() => {
                    isTransitioning = false;
                }, 1000);
            }

            // Update status with simple "PLAYING" message
            const statusElement = document.getElementById('status');
            if (!messageActive) {
                statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                statusElement.className = '';
                statusOriginal = statusElement.innerHTML;
            }
        }

        // ====== FUNCTION TO ADVANCE TO NEXT PLAYLIST ======
        function advanceToNextPlaylist() {
            // Prevent multiple simultaneous transitions
            if (isTransitioning) {
                console.log('⏳ Transition already in progress, skipping...');
                return;
            }

            // Move to next playlist
            currentPlaylistIndex++;

            // If we've played all playlists, loop back to the first
            if (currentPlaylistIndex >= playlistsForToday.length) {
                currentPlaylistIndex = 0;
                console.log('🔄 All playlists finished. Looping back to first.');
            }

            // Load the next playlist
            loadNextPlaylist();
        }

        // ====== YOUTUBE IFrame API ======
        function onYouTubeIframeAPIReady() {
            if (playlistsForToday.length === 0) {
                // If no playlists, show a message
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO CONTENT TODAY';
                return;
            }

            // Create player with first playlist
            player = new YT.Player('player', {
                width: '560',
                height: '315',
                playerVars: {
                    autoplay: 1,
                    controls: 1,
                    rel: 0,
                    mute: 1,
                    modestbranding: 1,
                    iv_load_policy: 3,
                    cc_load_policy: 0,
                    fs: 1,
                    playsinline: 1,
                    list: playlistsForToday[0],
                    listType: 'playlist'
                },
                events: {
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });

            // Update status
            const statusElement = document.getElementById('status');
            if (!messageActive) {
                statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                statusElement.className = '';
                statusOriginal = statusElement.innerHTML;
            }

            console.log(`✅ Player initialized with playlist 1/${playlistsForToday.length}`);
        }

        // ====== PLAYER STATE CHANGE ======
        function onPlayerStateChange(event) {
            // When playlist ends, move to next playlist
            if (event.data === YT.PlayerState.ENDED) {
                console.log('📯 Playlist ended. Advancing to next...');
                advanceToNextPlaylist();
            }

            // When video starts playing
            if (event.data === YT.PlayerState.PLAYING) {
                if (!messageActive) {
                    const statusElement = document.getElementById('status');
                    statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                    statusElement.className = '';
                    statusOriginal = statusElement.innerHTML;
                }
            }

            // When paused
            if (event.data === YT.PlayerState.PAUSED) {
                if (!messageActive) {
                    document.getElementById('status').innerHTML = '⏸ <span>●</span> PAUSED';
                    document.getElementById('status').className = '';
                    statusOriginal = '⏸ <span>●</span> PAUSED';
                }
            }
        }

        // ====== PLAYER ERROR HANDLER ======
        function onPlayerError(event) {
            console.log('⚠️ Player error:', event.data);

            // Try to advance to next playlist on error
            if (!messageActive) {
                document.getElementById('status').innerHTML = '⚠️ <span>●</span> ERROR - Next playlist...';
                document.getElementById('status').className = '';
            }

            setTimeout(() => {
                advanceToNextPlaylist();
            }, 3000);
        }

        // ====== FUNCTION TO ACTIVATE AUDIO (MOBILE) ======
        function activateAudio() {
            if (player && !soundActivated) {
                player.unMute();
                soundActivated = true;

                const button = document.getElementById('audio-toggle');
                button.classList.add('audio-activated');
                button.style.display = 'none';

                const statusElement = document.getElementById('status');
                statusElement.innerHTML = '🔊 <span>●</span> AUDIO ENABLED';
                statusElement.className = 'audio-message';

                setTimeout(() => {
                    if (!messageActive) {
                        statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                        statusElement.className = '';
                    }
                }, 2000);

                console.log('✅ Audio activated on mobile!');
            }
        }

        // ====== FUNCTION TO SHOW AUDIO MESSAGE ======
        function showAudioMessage() {
            messageActive = true;

            const statusElement = document.getElementById('status');
            statusOriginal = statusElement.innerHTML;

            statusElement.innerHTML = '🔊 <span>●</span> ENABLE AUDIO ON PLAYER';
            statusElement.className = 'audio-message';

            document.title = '🔊 ENABLE AUDIO ON PLAYER';

            const titleElement = document.getElementById('titulo');
            titleElement.innerHTML = '🔊 <span>ENABLE</span> AUDIO';
            titleElement.className = 'audio-message';

            const button = document.getElementById('audio-toggle');
            if (window.innerWidth <= 768) {
                button.style.display = 'block';
                button.classList.add('muted');
            }

            // After 15 seconds, return to normal
            setTimeout(() => {
                returnToNormal();
            }, 15000);
        }

        // ====== FUNCTION TO RETURN TO NORMAL ======
        function returnToNormal() {
            messageActive = false;

            const statusElement = document.getElementById('status');
            statusElement.innerHTML = '▶ <span>●</span> PLAYING';
            statusElement.className = '';

            document.title = 'Roma Invicta TV';

            const titleElement = document.getElementById('titulo');
            titleElement.innerHTML = 'Roma <span>Invicta</span> TV';
            titleElement.className = '';

            if (soundActivated) {
                const button = document.getElementById('audio-toggle');
                button.style.display = 'none';
            }

            if (player && player.getPlayerState) {
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                } else if (state === YT.PlayerState.PAUSED) {
                    statusElement.innerHTML = '⏸ <span>●</span> PAUSED';
                }
            }
        }

        // ====== HIDE ON MOUSE LEAVE ======
        let mouseTimer;
        const container = document.getElementById("player-container");

        container.addEventListener("mouseenter", () => {
            container.classList.remove("oculto");
            clearTimeout(mouseTimer);
        });

        container.addEventListener("mouseleave", () => {
            clearTimeout(mouseTimer);
            mouseTimer = setTimeout(() => {
                container.classList.add("oculto");
            }, 2000);
        });

        // ====== AUTOPLAY FALLBACK ======
        setTimeout(() => {
            if (player && player.getPlayerState && player.getPlayerState() === -1) {
                player.playVideo();
            }
        }, 3000);

        // ====== INITIALIZE AUDIO MESSAGE ======
        window.addEventListener('load', function() {
            setTimeout(() => {
                showAudioMessage();
            }, 1000);
        });

        // ====== MOBILE BUTTON EVENT ======
        document.getElementById('audio-toggle').addEventListener('click', activateAudio);

        // ====== DETECT WINDOW RESIZE ======
        window.addEventListener('resize', function() {
            const button = document.getElementById('audio-toggle');
            if (window.innerWidth <= 768 && !soundActivated && messageActive) {
                button.style.display = 'block';
            } else if (window.innerWidth > 768 || soundActivated) {
                button.style.display = 'none';
            }
        });
    </script>

</body>

</html>
