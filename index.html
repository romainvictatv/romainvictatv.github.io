<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roma Invicta TV</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.ico">

    <!-- Font Cinzel -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Cinzel', serif;
            position: relative;
            transition: background-image 0.5s ease;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* ===== LAYOUT PRINCIPAL ===== */
        #app {
            display: flex;
            gap: 20px;
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1100px;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        /* ===== SIDEBAR ===== */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 20px;
            padding: 20px 16px;
            border: 1px solid rgba(200, 0, 0, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-height: 90vh;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        #sidebar::-webkit-scrollbar {
            width: 4px;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: rgba(200, 0, 0, 0.3);
            border-radius: 10px;
        }

        #sidebar h3 {
            color: #dc143c;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 1px solid rgba(200, 0, 0, 0.2);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .category-group {
            margin-bottom: 16px;
        }

        .category-group .group-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-group .group-title:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .category-group .group-title .arrow {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .category-group .group-title .arrow.open {
            transform: rotate(90deg);
        }

        .category-group .group-items {
            padding-left: 12px;
            border-left: 1px solid rgba(200, 0, 0, 0.1);
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 500px;
        }

        .category-group .group-items.collapsed {
            max-height: 0;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .category-item:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .category-item input[type="checkbox"] {
            accent-color: #dc143c;
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .category-item label {
            cursor: pointer;
            flex: 1;
        }

        /* ===== SELECT ALL BUTTON ===== */
        #select-all-btn {
            width: 100%;
            padding: 8px 0;
            margin-top: 4px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid rgba(200, 0, 0, 0.3);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #select-all-btn:hover {
            background: rgba(200, 0, 0, 0.15);
            border-color: #dc143c;
            color: #dc143c;
        }

        /* ===== DURATION SLIDER ===== */
        #duration-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(200, 0, 0, 0.15);
        }

        #duration-section label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
        }

        #duration-slider {
            width: 100%;
            accent-color: #dc143c;
            cursor: pointer;
            height: 4px;
            background: rgba(200, 0, 0, 0.2);
            border-radius: 4px;
            -webkit-appearance: none;
        }

        #duration-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #dc143c;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(200, 0, 0, 0.3);
        }

        #duration-value {
            color: #dc143c;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .duration-note {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.6rem;
            text-align: center;
            margin-top: 4px;
            font-style: italic;
        }

        /* ===== PLAYER CONTAINER ===== */
        #player-container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 25px;
            opacity: 1;
            transition: opacity 1s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex: 1;
            max-width: 700px;
        }

        #player-container.oculto {
            opacity: 0.15;
        }

        /* Title */
        #titulo {
            text-align: center;
            color: #f0e6d3;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(200, 0, 0, 0.3);
            padding-bottom: 10px;
            transition: all 0.5s ease;
        }

        #titulo span {
            color: #dc143c;
        }

        /* Player */
        #player {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.15);
            display: block;
            background: #0a0a0a;
            min-height: 200px;
        }

        /* ===== NAVIGATION BUTTONS ===== */
        #nav-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 14px;
        }

        .nav-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(200, 0, 0, 0.4);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #f0e6d3;
            font-size: 1.5rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .nav-button:hover {
            background: rgba(200, 0, 0, 0.25);
            border-color: #dc143c;
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.2);
        }

        .nav-button:active {
            transform: scale(0.92);
        }

        .nav-button svg {
            width: 24px;
            height: 24px;
            fill: #f0e6d3;
            transition: fill 0.3s ease;
        }

        .nav-button:hover svg {
            fill: #dc143c;
        }

        #nav-counter {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 400;
            min-width: 60px;
            text-align: center;
        }

        #nav-counter span {
            color: #dc143c;
            font-weight: 700;
        }

        /* Status indicator */
        #status {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
            transition: all 0.5s ease;
        }

        #status span {
            color: #dc143c;
            font-weight: 700;
        }

        /* Audio message */
        #status.audio-message {
            color: #dc143c;
            font-size: 0.9rem;
            text-shadow: 0 0 20px rgba(200, 0, 0, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        #status.audio-message span {
            color: #ff6b6b;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        #titulo.audio-message {
            color: #dc143c;
            text-shadow: 0 0 40px rgba(200, 0, 0, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }

        #titulo.audio-message span {
            color: #ff6b6b;
        }

        /* ===== MOBILE AUDIO BUTTON ===== */
        #audio-toggle {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 16px 32px;
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #audio-toggle:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 0 60px rgba(200, 0, 0, 0.6);
        }

        #audio-toggle:active {
            transform: translateX(-50%) scale(0.95);
        }

        #audio-toggle.muted {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.4);
        }

        #audio-toggle.audio-activated {
            display: none !important;
        }

        /* ===== ABOUT BUTTON ===== */
        #about-button {
            display: block;
            margin: 20px auto 0;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid rgba(200, 0, 0, 0.3);
            border-radius: 50px;
            color: #f0e6d3;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            width: auto;
        }

        #about-button:hover {
            background: rgba(200, 0, 0, 0.15);
            border-color: #dc143c;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(200, 0, 0, 0.15);
            color: #dc143c;
        }

        #about-button:active {
            transform: scale(0.97);
        }

        .button-wrapper {
            text-align: center;
            margin-top: 5px;
        }

        /* ===== RESPONSIVENESS ===== */
        @media (max-width: 1024px) {
            #app {
                flex-direction: column;
                align-items: center;
            }

            #sidebar {
                width: 100%;
                min-width: unset;
                max-height: 300px;
                order: 2;
            }

            #player-container {
                max-width: 100%;
                width: 100%;
                order: 1;
            }
        }

        @media (max-width: 768px) {
            #titulo {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            #player-container {
                padding: 12px;
            }

            #status.audio-message {
                font-size: 0.7rem;
            }

            #audio-toggle {
                display: block;
                bottom: 70px;
                padding: 14px 24px;
                font-size: 1rem;
            }

            #about-button {
                padding: 10px 28px;
                font-size: 0.8rem;
            }

            .nav-button {
                width: 42px;
                height: 42px;
            }

            .nav-button svg {
                width: 20px;
                height: 20px;
            }

            #nav-bottom {
                gap: 14px;
            }

            #nav-counter {
                font-size: 0.6rem;
                min-width: 50px;
            }

            #sidebar {
                max-height: 250px;
                padding: 14px 12px;
            }
        }

        @media (max-width: 480px) {
            #titulo {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            #status {
                font-size: 0.7rem;
            }

            #status.audio-message {
                font-size: 0.6rem;
            }

            #audio-toggle {
                bottom: 60px;
                padding: 12px 20px;
                font-size: 0.8rem;
            }

            #about-button {
                padding: 8px 20px;
                font-size: 0.7rem;
                letter-spacing: 1px;
            }

            .nav-button {
                width: 36px;
                height: 36px;
            }

            .nav-button svg {
                width: 16px;
                height: 16px;
            }

            #nav-bottom {
                gap: 10px;
            }

            #nav-counter {
                font-size: 0.5rem;
                min-width: 40px;
            }

            #sidebar {
                max-height: 200px;
                padding: 10px 10px;
            }

            .category-item {
                font-size: 0.65rem;
                padding: 3px 0;
            }

            #duration-value {
                font-size: 0.7rem;
            }
        }

        @media (min-width: 769px) {
            #audio-toggle {
                display: none !important;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- ===== SIDEBAR ===== -->
        <div id="sidebar">
            <h3>⚔️ Filters</h3>

            <!-- Prose Group -->
            <div class="category-group">
                <div class="group-title" data-group="prose">
                    <span class="arrow">▶</span> Prose
                </div>
                <div class="group-items" id="group-prose">
                    <div class="category-item">
                        <input type="checkbox" id="cat-prosehistory" data-category="prosehistory">
                        <label for="cat-prosehistory">History</label>
                    </div>
                    <div class="category-item">
                        <input type="checkbox" id="cat-prosespeech" data-category="prosespeech">
                        <label for="cat-prosespeech">Speech</label>
                    </div>
                    <div class="category-item">
                        <input type="checkbox" id="cat-proseepistolary" data-category="proseepistolary">
                        <label for="cat-proseepistolary">Epistolary</label>
                    </div>
                </div>
            </div>

            <!-- Poetry Group -->
            <div class="category-group">
                <div class="group-title" data-group="poetry">
                    <span class="arrow">▶</span> Poetry
                </div>
                <div class="group-items" id="group-poetry">
                    <div class="category-item">
                        <input type="checkbox" id="cat-recitedpoetry" data-category="recitedpoetry">
                        <label for="cat-recitedpoetry">Recited Poetry</label>
                    </div>
                    <div class="category-item">
                        <input type="checkbox" id="cat-sungpoetry" data-category="sungpoetry">
                        <label for="cat-sungpoetry">Sung Poetry</label>
                    </div>
                </div>
            </div>

            <!-- Other Groups -->
            <div class="category-group">
                <div class="category-item" style="padding-left:0;">
                    <input type="checkbox" id="cat-cover" data-category="cover">
                    <label for="cat-cover">Cover and Others</label>
                </div>
                <div class="category-item" style="padding-left:0;">
                    <input type="checkbox" id="cat-musicother" data-category="musicother">
                    <label for="cat-musicother">Music Other</label>
                </div>
                <div class="category-item" style="padding-left:0;">
                    <input type="checkbox" id="cat-audiobook" data-category="audiobook">
                    <label for="cat-audiobook">Audiobook</label>
                </div>
            </div>

            <!-- Select All Button -->
            <button id="select-all-btn">☑ Select All Categories</button>

            <!-- Duration Slider -->
            <div id="duration-section">
                <label>⏱ Max Duration</label>
                <input type="range" id="duration-slider" min="0" max="10" value="10" step="1">
                <div id="duration-value">∞ Unlimited</div>
                <div class="duration-note">* Audiobook ignores duration filter</div>
            </div>

            <!-- Reset button -->
            <div style="margin-top:14px; text-align:center;">
                <button id="reset-filters" style="background:transparent; border:1px solid rgba(200,0,0,0.3); color:#f0e6d3; padding:6px 16px; border-radius:20px; font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:1px; cursor:pointer; transition:all 0.3s ease;">
                    Reset Filters
                </button>
            </div>
        </div>

        <!-- ===== PLAYER CONTAINER ===== -->
        <div id="player-container">
            <!-- TITLE -->
            <div id="titulo"><span>Roma</span> Invicta TV</div>

            <!-- PLAYER -->
            <div id="player"></div>

            <!-- NAVIGATION BOTTOM -->
            <div id="nav-bottom">
                <button id="prev-button" class="nav-button" aria-label="Previous video">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </button>

                <span id="nav-counter"><span id="video-counter">1</span> / <span id="total-counter">0</span></span>

                <button id="next-button" class="nav-button" aria-label="Next video">
                    <svg viewBox="0 0 24 24">
                        <path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/>
                    </svg>
                </button>
            </div>

            <!-- STATUS -->
            <div id="status">▶ <span>●</span> LIVE</div>

            <!-- ABOUT BUTTON -->
            <div class="button-wrapper">
                <a href="about.html" id="about-button">About & Credits</a>
            </div>

            <!-- MOBILE AUDIO BUTTON -->
            <button id="audio-toggle" class="muted">
                🔊 CLICK HERE TO TURN ON SOUND
            </button>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ============================================================
        // 📋 VIDEOLIST - Edite aqui!
        // ============================================================
        // Formato: URL |@Criador|Duração|categoria1|categoria2|...
        // Exemplo: https://www.youtube.com/watch?v=XXXXX |@Nome|2m30s|cover|
        // ============================================================

        const RAW_VIDEO_LIST = `

        https://www.youtube.com/watch?v=Ezt3tMoi3as |@FaryaFaraji&WorldMusicians|5m6s|musicother|
        https://www.youtube.com/watch?v=yDFAikbi0wE |@HeleenUytterhoeven(Heloon)|2m59s|cover|
        https://www.youtube.com/watch?v=SfiwOMzFfSM |@HeleenUytterhoeven(Heloon)|3m1s|cover|

        https://www.youtube.com/watch?v=KE7FvMsd__c |@Salve,Latina!|4m6s|audiobook|proseepistolary|

        https://www.youtube.com/watch?v=a9IeN-X3ntU |@Salve,Latina!|5m0s|audiobook|proseepistolary|
        https://www.youtube.com/watch?v=xu9ituEbBZ8 |@Salve,Latina!|4m3s|audiobook|proseepistolary|
        https://www.youtube.com/watch?v=kMNcL1yBho0 |@Salve,Latina!|8m0s|audiobook|proseepistolary|
        https://www.youtube.com/watch?v=09inde1LBic |@Salve,Latina!|6m14s|audiobook|proseepistolary|
        https://www.youtube.com/watch?v=8iMRPo7_3UA |@Salve,Latina!|14m44s|audiobook|proseepistolary|

        `;

        // ============================================================
        // 🚀 CÓDIGO - Não mexa a menos que saiba o que está fazendo
        // ============================================================

        // ====== RANDOM BACKGROUND ======
        (function() {
            const backgrounds = [
                "background1.jpg",
                "background2.jpg",
                "background3.jpg",
                "background4.jpg",
                "background5.jpg",
                "background6.jpg"
            ];
            const randomIndex = Math.floor(Math.random() * backgrounds.length);
            document.body.style.backgroundImage = `url("${backgrounds[randomIndex]}")`;
            console.log(`🎨 Background: ${backgrounds[randomIndex]}`);
        })();

        // ====== PARSE DURATION ======
        function parseDuration(str) {
            const match = str.match(/(?:(\d+)m)?(?:(\d+)s)?/);
            if (!match) return 0;
            return (parseInt(match[1]) || 0) * 60 + (parseInt(match[2]) || 0);
        }

        // ====== EXTRACT VIDEO ID ======
        function extractVideoId(url) {
            const match = url.match(/youtube\.com\/watch\?v=([^&]+)/);
            return match ? match[1] : null;
        }

        // ====== PARSE RAW VIDEO LIST ======
        function parseRawVideoList(text) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            const videos = [];
            for (const line of lines) {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length < 4) continue;
                const url = parts[0];
                const creator = parts[1].replace('@', '');
                const durationStr = parts[2];
                const categories = [];
                for (let i = 3; i < parts.length; i++) {
                    if (parts[i]) categories.push(parts[i]);
                }
                const videoId = extractVideoId(url);
                if (videoId) {
                    videos.push({
                        url: url,
                        videoId: videoId,
                        creator: creator,
                        duration: durationStr,
                        durationSeconds: parseDuration(durationStr),
                        categories: categories
                    });
                }
            }
            return videos;
        }

        // ====== VIDEO LIST ======
        const videoList = parseRawVideoList(RAW_VIDEO_LIST);
        console.log(`📋 Loaded ${videoList.length} videos`);

        // ====== DURATION PRESETS ======
        const durationPresets = [
            { label: "2 min", seconds: 120 },
            { label: "5 min", seconds: 300 },
            { label: "10 min", seconds: 600 },
            { label: "20 min", seconds: 1200 },
            { label: "30 min", seconds: 1800 },
            { label: "40 min", seconds: 2400 },
            { label: "50 min", seconds: 3000 },
            { label: "1 hour", seconds: 3600 },
            { label: "2 hours", seconds: 7200 },
            { label: "3 hours", seconds: 10800 },
            { label: "∞ Unlimited", seconds: Infinity }
        ];

        // ====== FILTER STATE ======
        let selectedCategories = new Set();
        let selectedDuration = Infinity;
        let filteredVideos = [];
        let currentFilteredIndex = 0;
        let playerReady = false;
        let player = null;
        let messageActive = false;
        let statusOriginal = '';
        let soundActivated = false;
        let hasActiveFilters = false;

        // ====== ALL CATEGORIES (excluindo audiobook para a seleção inicial) ======
        const ALL_CATEGORIES_EXCEPT_AUDIOBOOK = ['prosehistory', 'prosespeech', 'proseepistolary', 'recitedpoetry',
            'sungpoetry', 'cover', 'musicother'
        ];

        // ====== SHUFFLE ======
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ====== SAVE / LOAD RESUME ======
        const STORAGE_KEY = 'roma_tv_resume';
        const todayDate = new Date().toDateString();

        function saveProgress(index, time) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ index, time: Math.floor(time || 0), date: todayDate }));
            } catch (e) { console.warn('Could not save progress:', e); }
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) { return null; }
        }

        // ====== STOP PLAYER ======
        function stopPlayer() {
            if (playerReady && player) {
                player.stopVideo();
                console.log('⏹️ Player stopped');
            }
        }

        // ====== APPLY FILTERS ======
        function applyFilters() {
            const hasCategoryFilter = selectedCategories.size > 0;

            // Se não há categorias selecionadas, para o player
            if (!hasCategoryFilter) {
                filteredVideos = [];
                hasActiveFilters = false;
                updateUI();
                stopPlayer();
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO FILTERS SELECTED';
                document.getElementById('status').className = '';
                return;
            }

            hasActiveFilters = true;

            // Filtrar vídeos pelas categorias selecionadas
            filteredVideos = videoList.filter(video => {
                const matchesCategory = video.categories.some(cat => selectedCategories.has(cat));
                if (!matchesCategory) return false;

                // Filtro de duração (audiobook ignora)
                if (selectedDuration !== Infinity && !video.categories.includes('audiobook')) {
                    if (video.durationSeconds > selectedDuration) return false;
                }

                return true;
            });

            // Se não houver vídeos, para o player
            if (filteredVideos.length === 0) {
                filteredVideos = [];
                hasActiveFilters = false;
                updateUI();
                stopPlayer();
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO VIDEOS MATCH FILTERS';
                document.getElementById('status').className = '';
                return;
            }

            // Embaralhar
            shuffleArray(filteredVideos);

            // Verificar se o índice atual é válido
            if (currentFilteredIndex >= filteredVideos.length) {
                currentFilteredIndex = 0;
            }

            console.log(`📊 Filtered: ${filteredVideos.length} videos`);
            updateUI();

            // Carregar o primeiro vídeo
            if (playerReady && player) {
                loadFilteredVideo(currentFilteredIndex);
            } else {
                window.pendingVideoIndex = currentFilteredIndex;
                if (!player) initPlayer();
            }
        }

        // ====== UPDATE UI ======
        function updateUI() {
            if (filteredVideos.length === 0) {
                document.getElementById('video-counter').textContent = '0';
                document.getElementById('total-counter').textContent = '0';
                return;
            }
            document.getElementById('video-counter').textContent = currentFilteredIndex + 1;
            document.getElementById('total-counter').textContent = filteredVideos.length;
        }

        // ====== LOAD FILTERED VIDEO ======
        function loadFilteredVideo(index) {
            if (filteredVideos.length === 0) {
                stopPlayer();
                return;
            }
            if (index < 0) index = filteredVideos.length - 1;
            if (index >= filteredVideos.length) index = 0;
            currentFilteredIndex = index;
            const video = filteredVideos[currentFilteredIndex];
            document.getElementById('video-counter').textContent = currentFilteredIndex + 1;
            document.getElementById('total-counter').textContent = filteredVideos.length;
            console.log(`🎬 Loading: ${video.videoId}`);
            if (playerReady && player) {
                player.loadVideoById(video.videoId);
                player.playVideo();
            } else {
                window.pendingVideoIndex = currentFilteredIndex;
                if (!player) initPlayer();
            }
            if (!messageActive) {
                document.getElementById('status').innerHTML = '▶ <span>●</span> PLAYING';
                document.getElementById('status').className = '';
                statusOriginal = '▶ <span>●</span> PLAYING';
            }
        }

        // ====== NAVIGATION ======
        function loadNext() {
            if (filteredVideos.length === 0) return;
            saveCurrentProgress();
            loadFilteredVideo(currentFilteredIndex + 1);
        }

        function loadPrev() {
            if (filteredVideos.length === 0) return;
            saveCurrentProgress();
            loadFilteredVideo(currentFilteredIndex - 1);
        }

        function saveCurrentProgress() {
            if (playerReady && player && player.getCurrentTime) {
                saveProgress(currentFilteredIndex, player.getCurrentTime());
            } else {
                saveProgress(currentFilteredIndex, 0);
            }
        }

        // ====== INIT PLAYER ======
        function initPlayer() {
            if (filteredVideos.length === 0) return;
            const videoId = filteredVideos[0].videoId;
            if (player) {
                player.loadVideoById(videoId);
                player.playVideo();
                return;
            }
            player = new YT.Player('player', {
                width: '560',
                height: '315',
                videoId: videoId,
                playerVars: { autoplay: 1, controls: 1, rel: 0, mute: 1, modestbranding: 1, iv_load_policy: 3,
                    cc_load_policy: 0, fs: 1, playsinline: 1 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        // ====== YOUTUBE EVENTS ======
        function onYouTubeIframeAPIReady() {
            console.log('🎬 YouTube API ready');

            // Inicializar com TODAS as categorias (exceto audiobook) selecionadas
            selectedCategories = new Set(ALL_CATEGORIES_EXCEPT_AUDIOBOOK);

            // Marcar os checkboxes visualmente
            document.querySelectorAll('.category-item input[type="checkbox"]').forEach(cb => {
                const cat = cb.dataset.category;
                if (selectedCategories.has(cat)) {
                    cb.checked = true;
                }
            });

            applyFilters();

            // Se não tiver vídeos, mostra mensagem
            if (filteredVideos.length === 0) {
                document.getElementById('status').innerHTML = '⏸ <span>●</span> NO VIDEOS AVAILABLE';
                document.getElementById('status').className = '';
                document.getElementById('video-counter').textContent = '0';
                document.getElementById('total-counter').textContent = '0';
            }
        }

        function onPlayerReady() {
            playerReady = true;
            console.log('✅ Player ready');
            if (window.pendingVideoIndex !== undefined && window.pendingVideoIndex !== null) {
                const idx = window.pendingVideoIndex;
                if (idx < filteredVideos.length) {
                    const video = filteredVideos[idx];
                    if (video) {
                        player.loadVideoById(video.videoId);
                        player.playVideo();
                    }
                }
                window.pendingVideoIndex = undefined;
            }
            if (!messageActive && filteredVideos.length > 0) {
                document.getElementById('status').innerHTML = '▶ <span>●</span> PLAYING';
                document.getElementById('status').className = '';
                statusOriginal = '▶ <span>●</span> PLAYING';
            }
            setTimeout(saveCurrentProgress, 3000);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                if (!messageActive && filteredVideos.length > 0) {
                    document.getElementById('status').innerHTML = '▶ <span>●</span> PLAYING';
                    document.getElementById('status').className = '';
                    statusOriginal = '▶ <span>●</span> PLAYING';
                }
            }
            if (event.data === YT.PlayerState.ENDED) {
                console.log('📯 Video ended');
                saveCurrentProgress();
                loadNext();
            }
            if (event.data === YT.PlayerState.PAUSED) {
                if (!messageActive) {
                    document.getElementById('status').innerHTML = '⏸ <span>●</span> PAUSED';
                    document.getElementById('status').className = '';
                    statusOriginal = '⏸ <span>●</span> PAUSED';
                }
            }
        }

        function onPlayerError(event) {
            console.log('⚠️ Player error:', event.data);
            if (!messageActive) {
                document.getElementById('status').innerHTML = '⚠️ <span>●</span> ERROR - Next...';
                document.getElementById('status').className = '';
            }
            setTimeout(() => { saveCurrentProgress();
                loadNext(); }, 3000);
        }

        // ====== AUDIO ======
        function activateAudio() {
            if (playerReady && player && !soundActivated) {
                player.unMute();
                soundActivated = true;
                document.getElementById('audio-toggle').classList.add('audio-activated');
                document.getElementById('audio-toggle').style.display = 'none';
                const statusElement = document.getElementById('status');
                statusElement.innerHTML = '🔊 <span>●</span> AUDIO ENABLED';
                statusElement.className = 'audio-message';
                setTimeout(() => {
                    if (!messageActive) {
                        statusElement.innerHTML = '▶ <span>●</span> PLAYING';
                        statusElement.className = '';
                    }
                }, 2000);
                console.log('✅ Audio activated');
            }
        }

        // ====== AUDIO MESSAGE ======
        function showAudioMessage() {
            messageActive = true;
            const statusElement = document.getElementById('status');
            statusOriginal = statusElement.innerHTML;
            statusElement.innerHTML = '🔊 <span>●</span> ENABLE AUDIO ON PLAYER';
            statusElement.className = 'audio-message';
            document.title = '🔊 ENABLE AUDIO ON PLAYER';
            document.getElementById('titulo').innerHTML = '🔊 <span>ENABLE</span> AUDIO';
            document.getElementById('titulo').className = 'audio-message';
            if (window.innerWidth <= 768) {
                document.getElementById('audio-toggle').style.display = 'block';
                document.getElementById('audio-toggle').classList.add('muted');
            }
            setTimeout(returnToNormal, 15000);
        }

        function returnToNormal() {
            messageActive = false;
            document.getElementById('status').innerHTML = '▶ <span>●</span> PLAYING';
            document.getElementById('status').className = '';
            document.title = 'Roma Invicta TV';
            document.getElementById('titulo').innerHTML = '<span>Roma</span> Invicta TV';
            document.getElementById('titulo').className = '';
            if (soundActivated) document.getElementById('audio-toggle').style.display = 'none';
            if (playerReady && player && player.getPlayerState) {
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) document.getElementById('status').innerHTML = '▶ <span>●</span> PLAYING';
                else if (state === YT.PlayerState.PAUSED) document.getElementById('status').innerHTML = '⏸ <span>●</span> PAUSED';
            }
        }

        // ====== HIDE ON MOUSE LEAVE ======
        let mouseTimer;
        const container = document.getElementById("player-container");
        container.addEventListener("mouseenter", () => {
            container.classList.remove("oculto");
            clearTimeout(mouseTimer);
        });
        container.addEventListener("mouseleave", () => {
            clearTimeout(mouseTimer);
            mouseTimer = setTimeout(() => container.classList.add("oculto"), 2000);
        });

        // ====== INIT ======
        window.addEventListener('load', function() {
            // A inicialização agora é feita no onYouTubeIframeAPIReady
            setTimeout(showAudioMessage, 1500);
        });

        setInterval(() => {
            if (playerReady && player && player.getCurrentTime && filteredVideos.length > 0) {
                saveCurrentProgress();
            }
        }, 5000);

        window.addEventListener('beforeunload', () => {
            if (playerReady && player && filteredVideos.length > 0) saveCurrentProgress();
        });

        // ====== NAVIGATION BUTTONS ======
        document.getElementById('next-button').addEventListener('click', loadNext);
        document.getElementById('prev-button').addEventListener('click', loadPrev);
        document.getElementById('audio-toggle').addEventListener('click', activateAudio);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') { e.preventDefault();
                loadNext(); }
            if (e.key === 'ArrowLeft') { e.preventDefault();
                loadPrev(); }
        });

        // ====== SIDEBAR COLLAPSE ======
        document.querySelectorAll('.group-title').forEach(title => {
            title.addEventListener('click', function() {
                const group = this.dataset.group;
                const items = document.getElementById(`group-${group}`);
                const arrow = this.querySelector('.arrow');
                items.classList.toggle('collapsed');
                arrow.classList.toggle('open');
            });
        });

        // ====== CATEGORY FILTER ======
        document.querySelectorAll('.category-item input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', function() {
                const cat = this.dataset.category;
                if (this.checked) {
                    selectedCategories.add(cat);
                } else {
                    selectedCategories.delete(cat);
                }
                applyFilters();
            });
        });

        // ====== SELECT ALL ======
        document.getElementById('select-all-btn').addEventListener('click', function() {
            const checkboxes = document.querySelectorAll('.category-item input[type="checkbox"]');
            // Verifica se todos estão marcados
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);

            // Se todos estão marcados, desmarca todos. Senão, marca todos.
            checkboxes.forEach(cb => {
                cb.checked = !allChecked;
                const cat = cb.dataset.category;
                if (cb.checked) {
                    selectedCategories.add(cat);
                } else {
                    selectedCategories.delete(cat);
                }
            });

            applyFilters();
        });

        // ====== DURATION FILTER ======
        const durationSlider = document.getElementById('duration-slider');
        const durationValue = document.getElementById('duration-value');
        durationSlider.addEventListener('input', function() {
            const idx = parseInt(this.value);
            const preset = durationPresets[idx];
            if (preset) {
                selectedDuration = preset.seconds;
                durationValue.textContent = preset.label;
                if (selectedCategories.size > 0) {
                    applyFilters();
                }
            }
        });

        // ====== RESET FILTERS ======
        document.getElementById('reset-filters').addEventListener('click', function() {
            // Resetar para o estado inicial: todas as categorias (exceto audiobook) marcadas
            selectedCategories = new Set(ALL_CATEGORIES_EXCEPT_AUDIOBOOK);
            document.querySelectorAll('.category-item input[type="checkbox"]').forEach(cb => {
                const cat = cb.dataset.category;
                cb.checked = selectedCategories.has(cat);
            });

            durationSlider.value = durationPresets.length - 1;
            selectedDuration = Infinity;
            durationValue.textContent = '∞ Unlimited';

            applyFilters();
        });
    </script>

</body>

</html>
